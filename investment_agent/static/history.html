<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史会话 — 投研 Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; }
  .navbar { background: #1a1a2e; color: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 20px; }
  .navbar a { color: #ccc; text-decoration: none; font-size: 14px; }
  .navbar a:hover, .navbar a.active { color: #fff; }
  .navbar .brand { font-weight: 600; font-size: 16px; color: #fff; margin-right: 10px; }
  .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
  h2 { font-size: 18px; margin-bottom: 20px; }
  .session-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .session-card .info h3 { font-size: 14px; margin-bottom: 4px; }
  .session-card .info .meta { font-size: 12px; color: #999; }
  .actions { display: flex; gap: 8px; }
  .btn { border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-primary { background: #1a1a2e; color: #fff; }
  .btn-danger { background: #e53935; color: #fff; }
  .empty { text-align: center; color: #999; padding: 60px 0; font-size: 14px; }
</style>
</head>
<body>
<nav class="navbar">
  <span class="brand">📈 投研 Agent</span>
  <a href="/">对话</a>
  <a href="/agents">Agent 配置</a>
  <a href="/skills">Skills</a>
  <a href="/settings">设置</a>
  <a href="/history" class="active">历史</a>
  <a href="/observability">观测</a>
</nav>

<div class="container">
  <h2>历史会话</h2>
  <div id="sessionList"><div class="empty">暂无历史会话</div></div>
</div>

<script>
async function load() {
  const res = await fetch('/api/sessions');
  const sessions = await res.json();
  const list = document.getElementById('sessionList');
  if (!sessions.length) return;
  list.innerHTML = sessions.map(s => `
    <div class="session-card">
      <div class="info">
        <h3>${esc(s.title || '未命名')}</h3>
        <div class="meta">${s.created_at?.slice(0,16) || ''} · ${s.status}</div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="location.href='/?session=${s.id}'">继续对话</button>
        <button class="btn btn-danger" onclick="del('${s.id}')">删除</button>
      </div>
    </div>
  `).join('');
}

async function del(id) {
  if (!confirm('确认删除该会话？')) return;
  await fetch(`/api/sessions/${id}`, {method: 'DELETE'});
  load();
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();
</script>
</body>
</html>
