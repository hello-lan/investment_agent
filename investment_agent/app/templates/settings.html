{% extends "base.html" %}
{% block title %}模型 — 投研 Agent{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/css/settings.css">
{% endblock %}
{% block content %}
<div class="container">

  <div class="card">
    <div class="card-header"><h3>默认模型</h3></div>
    <div class="card-body">
      <div class="default-row">
        <label>新建对话默认使用：</label>
        <select id="defaultModel"></select>
      </div>
    </div>
    <div class="card-footer">
      <span class="inline-msg" id="defaultMsg"></span>
      <button class="btn-save-inline" onclick="saveDefault()">保存</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>模型配置</h3>
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ 添加模型</button>
    </div>
    <div class="card-body">
      <div id="modelListContainer" class="model-list"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><h3>执行引擎参数</h3></div>
    <div class="card-body">
      <div class="engine-grid">
        <div class="form-field">
          <label>最大步数 <span class="range-val" id="maxStepsVal">30</span></label>
          <div class="range-row"><input type="range" id="maxSteps" min="5" max="100" step="5" oninput="document.getElementById('maxStepsVal').textContent=this.value"></div>
        </div>
        <div class="form-field">
          <label>慢思考间隔（每N步）<span class="range-val" id="slowThinkVal">3</span></label>
          <div class="range-row"><input type="range" id="slowThink" min="1" max="10" step="1" oninput="document.getElementById('slowThinkVal').textContent=this.value"></div>
        </div>
        <div class="form-field">
          <label>Token 预算</label>
          <input type="number" id="tokenBudget" min="10000" max="500000" step="10000">
        </div>
        <div class="form-field">
          <label>死循环检测阈值 <span class="range-val" id="loopVal">3</span></label>
          <div class="range-row"><input type="range" id="loopThreshold" min="2" max="10" step="1" oninput="document.getElementById('loopVal').textContent=this.value"></div>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <span class="inline-msg" id="engineMsg"></span>
      <button class="btn-save-inline" onclick="saveEngine()">保存</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><h3>上下文压缩</h3></div>
    <div class="card-body">
      <div class="engine-grid">
        <div class="form-field">
          <label>启用压缩</label>
          <select id="compressEnabled">
            <option value="true">开启</option>
            <option value="false">关闭</option>
          </select>
        </div>
        <div class="form-field">
          <label>保留最近消息条数</label>
          <input type="number" id="compressRecentKeep" min="0" step="1">
        </div>
        <div class="form-field">
          <label>单条消息最大字符</label>
          <input type="number" id="compressMaxChars" min="200" step="100">
        </div>
        <div class="form-field">
          <label>上下文总字符预算</label>
          <input type="number" id="compressTotalBudget" min="2000" step="1000">
        </div>
      </div>
    </div>
    <div class="card-footer">
      <span class="inline-msg" id="compressMsg"></span>
      <button class="btn-save-inline" onclick="saveCompress()">保存</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><h3>Skills 目录</h3></div>
    <div class="card-body">
      <div class="form-row">
        <label>Skills Directory</label>
        <input type="text" id="skillsDirectory" placeholder="如：skills 或 /opt/app/skills">
      </div>
    </div>
    <div class="card-footer">
      <span class="inline-msg" id="skillsMsg"></span>
      <button class="btn-save-inline" onclick="saveSkillsDirectory()">保存</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><h3>数据源</h3></div>
    <div class="card-body">
      <div class="form-row">
        <label>Tushare Token（可选）</label>
        <input type="password" id="tushareToken" placeholder="留空则只使用 AKShare">
      </div>
    </div>
    <div class="card-footer">
      <span class="inline-msg" id="toolsMsg"></span>
      <button class="btn-save-inline" onclick="saveTools()">保存</button>
    </div>
  </div>

</div>

<!-- 添加/编辑模型弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">添加模型</div>
    <input type="hidden" id="mEditId">
    <div class="form-row">
      <label>显示名称 *</label>
      <input type="text" id="mName" placeholder="如：Claude Sonnet 4.6">
    </div>
    <div class="form-row">
      <label>唯一 ID *</label>
      <input type="text" id="mId" placeholder="如：claude-default（留空自动生成）">
      <div class="hint">用于内部标识，创建后不可修改</div>
    </div>
    <div class="form-row">
      <label>类型</label>
      <select id="mType" onchange="toggleBaseUrl()">
        <option value="anthropic">Anthropic（原生 Claude SDK）</option>
        <option value="openai_compat">OpenAI 兼容（DeepSeek / Qwen / Ollama 等）</option>
      </select>
    </div>
    <div class="form-row">
      <label>API Key</label>
      <input type="password" id="mKey" placeholder="sk-...">
    </div>
    <div class="form-row">
      <label>Model Name *</label>
      <input type="text" id="mModel" placeholder="如：claude-sonnet-4-6 或 deepseek-chat">
    </div>
    <div class="form-row" id="baseUrlRow">
      <label>Base URL</label>
      <input type="text" id="mBaseUrl" placeholder="如：https://api.deepseek.com">
      <div class="hint">留空则使用 https://api.openai.com/v1</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveModel()">保存</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/settings.js"></script>
<script src="/static/js/settings2.js"></script>
{% endblock %}
