{% extends "base.html" %}
{% block title %}Agent — 投研 Agent{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/css/settings.css">
<style>
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.top-bar h2{font-size:18px;}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.agent-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:18px;}
.agent-card h3{font-size:15px;margin-bottom:6px;}
.agent-card .desc{font-size:13px;color:#666;margin-bottom:10px;min-height:36px;}
.agent-card .meta{font-size:12px;color:#999;margin-bottom:12px;}
.agent-card .actions{display:flex;gap:8px;}
.btn-success{background:#e8f5e9;color:#2e7d32;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;}
</style>
{% endblock %}
{% block content %}
<div class="container">
  <div class="top-bar">
    <h2>Agent 配置</h2>
    <button class="btn btn-primary" onclick="openModal()">+ 新建 Agent</button>
  </div>
  <div class="agent-grid" id="agentGrid">
    <div class="empty">暂无 Agent，点击右上角新建</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">新建 Agent</div>
    <input type="hidden" id="agentId">
    <div class="form-row">
      <label>名称 *</label>
      <input type="text" id="agentName" placeholder="如：A股基本面分析师">
    </div>
    <div class="form-row">
      <label>描述</label>
      <input type="text" id="agentDesc" placeholder="简短描述这个 Agent 的用途">
    </div>
    <div class="form-row">
      <label>系统提示词</label>
      <textarea id="agentPrompt" rows="6" style="width:100%;border:1px solid #ddd;border-radius:6px;padding:9px 12px;font-size:14px;outline:none;font-family:inherit;resize:vertical;" placeholder="定义 Agent 的角色、能力和行为规范..."></textarea>
    </div>
    <div class="form-row">
      <label>模型</label>
      <select id="agentModel"></select>
      <div class="hint">在<a href="/model" style="color:#1a1a2e">模型</a>管理可用模型</div>
    </div>
    <div class="form-row">
      <label>挂载 Skills</label>
      <div id="agentSkills" style="display:flex;flex-wrap:wrap;gap:8px;border:1px solid #ddd;border-radius:6px;padding:10px;min-height:42px;background:#fafafa;"></div>
      <div class="hint">仅会在该 Agent 下注册并可调用已勾选的 skills</div>
    </div>
    <div class="form-row">
      <label>Temperature</label>
      <input type="number" id="agentTemp" value="0.7" min="0" max="1" step="0.1">
    </div>
    <div class="form-row">
      <label>Max Tokens</label>
      <input type="number" id="agentMaxTokens" value="4096" min="512" max="32000" step="512">
    </div>
    <div class="form-row">
      <label>上下文压缩</label>
      <select id="agentCompressEnabled">
        <option value="inherit">使用默认</option>
        <option value="true">开启</option>
        <option value="false">关闭</option>
      </select>
      <div class="hint">留空则使用系统默认压缩参数</div>
    </div>
    <div class="form-row">
      <label>保留最近消息条数</label>
      <input type="number" id="agentCompressRecentKeep" min="0" step="1" placeholder="留空=默认">
    </div>
    <div class="form-row">
      <label>单条消息最大字符</label>
      <input type="number" id="agentCompressMaxChars" min="200" step="100" placeholder="留空=默认">
    </div>
    <div class="form-row">
      <label>上下文总字符预算</label>
      <input type="number" id="agentCompressTotalBudget" min="2000" step="1000" placeholder="留空=默认">
    </div>
    <div class="form-row">
      <label>最大步数</label>
      <div class="range-row"><input type="range" id="agentMaxSteps" min="5" max="100" step="5" oninput="document.getElementById('agentMaxStepsVal').textContent=this.value"><span class="range-val" id="agentMaxStepsVal">30</span></div>
      <div class="hint">留空=默认 30</div>
    </div>
    <div class="form-row">
      <label>慢思考间隔（每N步）</label>
      <div class="range-row"><input type="range" id="agentSlowThink" min="1" max="10" step="1" oninput="document.getElementById('agentSlowThinkVal').textContent=this.value"><span class="range-val" id="agentSlowThinkVal">3</span></div>
      <div class="hint">留空=默认 3</div>
    </div>
    <div class="form-row">
      <label>Token 预算</label>
      <input type="number" id="agentTokenBudget" min="10000" max="500000" step="10000" placeholder="留空=默认 100000">
    </div>
    <div class="form-row">
      <label>死循环检测阈值</label>
      <div class="range-row"><input type="range" id="agentLoopThreshold" min="2" max="10" step="1" oninput="document.getElementById('agentLoopVal').textContent=this.value"><span class="range-val" id="agentLoopVal">3</span></div>
      <div class="hint">留空=默认 3</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveAgent()">保存</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/agents.js"></script>
{% endblock %}
