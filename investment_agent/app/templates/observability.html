{% extends "base.html" %}
{% block title %}统计 — 投研 Agent{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/css/main.css">
<style>
  .obs-wrap { max-width: 1200px; margin: 20px auto; padding: 0 20px 20px; }
  .obs-controls { display: grid; grid-template-columns: 1fr 1fr 120px 140px 120px; gap: 10px; margin-bottom: 14px; }
  .obs-controls input, .obs-controls select, .obs-controls button { border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; font-size: 13px; }
  .obs-controls button { background: #1a1a2e; color: #fff; cursor: pointer; }
  .obs-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .obs-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
  .obs-card h3 { margin: 0; padding: 12px 14px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .obs-table-wrap { overflow: auto; max-height: 340px; }
  .obs-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .obs-table th, .obs-table td { border-bottom: 1px solid #f0f0f0; padding: 8px 10px; text-align: left; vertical-align: top; }
  .obs-table th { position: sticky; top: 0; background: #fafafa; }
  .obs-muted { color: #777; font-size: 12px; margin-bottom: 10px; }
  .obs-pre { white-space: pre-wrap; max-width: 460px; word-break: break-word; }
</style>
{% endblock %}
{% block content %}
<div class="obs-wrap">
  <div class="obs-controls">
    <input id="sessionId" placeholder="session_id（可选）">
    <input id="taskId" placeholder="task_id（可选）">
    <input id="limit" type="number" min="1" max="500" value="100">
    <select id="autoRefresh">
      <option value="on" selected>自动刷新：开</option>
      <option value="off">自动刷新：关</option>
    </select>
    <button id="btnRefresh">立即刷新</button>
  </div>
  <div class="obs-muted" id="lastUpdated">最后更新：-</div>

  <div class="obs-grid">
    <div class="obs-card">
      <h3>链路日志（trace_log）</h3>
      <div class="obs-table-wrap">
        <table class="obs-table" id="traceTable">
          <thead>
            <tr>
              <th>时间</th><th>agent</th><th>session_id</th><th>task_id</th><th>step</th>
              <th>event_type</th><th>model</th><th>input</th><th>output</th><th>detail</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/observability.js"></script>
{% endblock %}
