{% extends "base.html" %}
{% block title %}文件浏览 — 投研 Agent{% endblock %}
{% block head %}
<style>
  .file-page { display: flex; height: calc(100vh - 44px); }
  .file-sidebar { width: 320px; min-width: 240px; border-right: 1px solid #e0e0e0; background: #fafafa; overflow-y: auto; display: flex; flex-direction: column; }
  .file-sidebar-header { padding: 12px 16px; font-weight: 600; font-size: 13px; color: #666; border-bottom: 1px solid #e0e0e0; background: #fff; display: flex; justify-content: space-between; align-items: center; }
  .file-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
  .tree-item { cursor: pointer; user-select: none; }
  .tree-row { display: flex; align-items: center; padding: 6px 12px; font-size: 13px; gap: 6px; white-space: nowrap; }
  .tree-row:hover { background: #eef1f7; }
  .tree-row.active { background: #dce3f5; color: #1a1a2e; }
  .tree-row .icon { width: 18px; text-align: center; flex-shrink: 0; font-size: 14px; }
  .tree-row .arrow { width: 16px; text-align: center; flex-shrink: 0; font-size: 10px; transition: transform 0.15s; }
  .tree-row .arrow.open { transform: rotate(90deg); }
  .tree-row .name { overflow: hidden; text-overflow: ellipsis; }
  .tree-row .size { font-size: 11px; color: #999; margin-left: auto; flex-shrink: 0; }
  .tree-children { display: none; }
  .tree-children.open { display: block; }
  .tree-children .tree-row { padding-left: 24px; }
  .file-viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; }
  .file-viewer-header { padding: 10px 16px; border-bottom: 1px solid #e0e0e0; font-size: 13px; font-weight: 600; color: #333; background: #fafafa; display: flex; align-items: center; gap: 8px; }
  .file-viewer-body { flex: 1; overflow: auto; }
  .file-viewer-body iframe { width: 100%; height: 100%; border: none; }
  .file-viewer-body .content { padding: 20px 24px; max-width: 900px; font-size: 14px; line-height: 1.7; color: #333; }
  .file-viewer-body .content h1, .file-viewer-body .content h2, .file-viewer-body .content h3 { margin-top: 1.2em; margin-bottom: 0.5em; }
  .file-viewer-body .content p { margin-bottom: 0.8em; }
  .file-viewer-body .content table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
  .file-viewer-body .content th, .file-viewer-body .content td { border: 1px solid #ddd; padding: 6px 10px; font-size: 13px; }
  .file-viewer-body .content th { background: #f5f5f5; }
  .file-viewer-body .content pre { background: #f5f5f5; padding: 12px 16px; border-radius: 4px; overflow-x: auto; font-size: 12px; line-height: 1.5; }
  .file-viewer-body .content code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .file-viewer-body .content pre code { background: none; padding: 0; }
  .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #bbb; font-size: 14px; }
  .loading { color: #999; font-size: 13px; padding: 20px; text-align: center; }
  .resize-handle { width: 4px; cursor: col-resize; background: transparent; flex-shrink: 0; }
  .resize-handle:hover { background: #e0e0e0; }
</style>
{% endblock %}
{% block content %}
<div class="file-page">
  <div class="file-sidebar" id="sidebar">
    <div class="file-sidebar-header">
      <span>data/ 目录</span>
      <span style="font-size:11px;color:#aaa;" id="fileCount"></span>
    </div>
    <div class="file-tree" id="fileTree">
      <div class="loading">加载中...</div>
    </div>
  </div>
  <div class="resize-handle" id="resizeHandle"></div>
  <div class="file-viewer">
    <div class="file-viewer-header" id="viewerHeader">选择左侧文件查看内容</div>
    <div class="file-viewer-body" id="viewerBody">
      <div class="empty-state">← 点击左侧文件查看内容</div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/js/files.js?v=2"></script>
{% endblock %}
