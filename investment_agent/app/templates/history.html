{% extends "base.html" %}
{% block title %}历史会话 — 投研 Agent{% endblock %}
{% block head %}
<style>
  .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
  h2 { font-size: 18px; margin-bottom: 20px; }
  .session-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .session-card .info h3 { font-size: 14px; margin-bottom: 4px; }
  .session-card .info .meta { font-size: 12px; color: #999; }
  .actions { display: flex; gap: 8px; }
  .btn { border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-primary { background: #1a1a2e; color: #fff; }
  .btn-danger { background: #e53935; color: #fff; }
  .empty { text-align: center; color: #999; padding: 60px 0; font-size: 14px; }
</style>
{% endblock %}
{% block content %}
<div class="container">
  <h2>历史会话</h2>
  <div id="sessionList"><div class="empty">暂无历史会话</div></div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function load() {
  const res = await fetch('/api/sessions');
  const sessions = await res.json();
  const list = document.getElementById('sessionList');
  if (!sessions.length) return;
  list.innerHTML = sessions.map(s => `
    <div class="session-card">
      <div class="info">
        <h3>${esc(s.title || '未命名')}</h3>
        <div class="meta">${s.created_at?.slice(0,16) || ''} · ${s.status}</div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="location.href='/?session=${s.id}'">继续对话</button>
        <button class="btn btn-danger" onclick="del('${s.id}')">删除</button>
      </div>
    </div>
  `).join('');
}

async function del(id) {
  if (!confirm('确认删除该会话？')) return;
  await fetch(`/api/sessions/${id}`, {method: 'DELETE'});
  load();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load();
</script>
{% endblock %}
