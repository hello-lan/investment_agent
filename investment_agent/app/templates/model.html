{% extends "base.html" %}
{% block title %}模型 — 投研 Agent{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/css/settings.css">
{% endblock %}
{% block content %}
<div class="container">

  <div class="card">
    <div class="card-header">
      <h3>模型配置</h3>
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ 添加模型</button>
    </div>
    <div class="card-body">
      <div id="modelListContainer" class="model-list"></div>
    </div>
  </div>

</div>

<!-- 添加/编辑模型弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">添加模型</div>
    <input type="hidden" id="mEditId">

    <div class="form-section">标识</div>
    <div class="form-row">
      <label>显示名称 <span class="required">*</span></label>
      <input type="text" id="mName" placeholder="如：Claude Sonnet 4.6">
    </div>
    <div class="form-row">
      <label>唯一 ID <span class="optional">（可选）</span></label>
      <input type="text" id="mId" placeholder="留空自动生成">
      <div class="hint">用于内部标识，创建后不可修改</div>
    </div>

    <div class="form-section">连接配置</div>
    <div class="form-row">
      <label>Provider 类型 <span class="required">*</span></label>
      <select id="mType" onchange="toggleBaseUrl(); toggleCacheTip()">
        <option value="anthropic">Anthropic Claude（原生 SDK + Prompt Caching）</option>
        <option value="deepseek">DeepSeek（OpenAI 兼容 + 自动缓存）</option>
        <option value="qwen">Qwen / 通义千问（DashScope + 自动缓存）</option>
        <option value="openai_compat">OpenAI 兼容（通用，无缓存）</option>
      </select>
      <div class="hint" id="cacheTip" style="margin-top: 4px; color: #666;"></div>
    </div>
    <div class="form-row">
      <label>Model Name <span class="required">*</span></label>
      <input type="text" id="mModel" placeholder="如：claude-sonnet-4-6 或 deepseek-chat">
    </div>
    <div class="form-row">
      <label>API Key <span class="required">*</span></label>
      <input type="password" id="mKey" placeholder="sk-...">
    </div>
    <div class="form-row" id="baseUrlRow">
      <label>Base URL <span class="required">*</span></label>
      <input type="text" id="mBaseUrl" placeholder="如：https://api.deepseek.com">
      <div class="hint">留空则使用 https://api.openai.com/v1</div>
    </div>

    <div class="form-row" id="cacheRow">
      <label>
        <input type="checkbox" id="mEnableCache" checked style="width: auto; margin-right: 6px;">
        启用 Prompt 缓存优化
      </label>
      <div class="hint" id="cacheDetailTip">Claude: 节省 80-90% 输入成本 | DeepSeek/Qwen: 自动缓存</div>
    </div>

    <div class="form-section">可选</div>
    <div class="form-row">
      <label>计价币种 <span class="optional">（可选）</span></label>
      <div class="radio-row">
        <label class="radio-label">
          <input type="radio" name="mCurrency" value="USD" checked>
          <span class="radio-circle"></span>
          USD ($)
        </label>
        <label class="radio-label">
          <input type="radio" name="mCurrency" value="CNY">
          <span class="radio-circle"></span>
          CNY (¥)
        </label>
      </div>
    </div>
    <div class="form-row">
      <label>输入价格 <span class="optional">（可选）</span></label>
      <input type="number" id="mInputPrice" step="0.01" placeholder="每百万 token 价格，留空则不估算费用">
    </div>
    <div class="form-row">
      <label>输出价格 <span class="optional">（可选）</span></label>
      <input type="number" id="mOutputPrice" step="0.01" placeholder="每百万 token 价格，留空则不估算费用">
    </div>

    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveModel()">保存</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
// 缓存提示映射
const CACHE_TIPS = {
    'anthropic': '✅ 支持显式 Prompt Caching（cache_control），预计降低 80-90% 输入成本',
    'deepseek': '✅ 支持自动前缀缓存，系统会优化 prompt 结构以提升命中率',
    'qwen': '✅ 自动 KV 缓存（需安装 dashscope SDK），无需额外配置',
    'openai_compat': '⚠️ 不提供原生缓存支持，每次请求全量计费',
};
function toggleCacheTip() {
    const type = document.getElementById('mType').value;
    const tipEl = document.getElementById('cacheTip');
    const detailEl = document.getElementById('cacheDetailTip');
    const cacheRow = document.getElementById('cacheRow');
    if (tipEl) tipEl.textContent = CACHE_TIPS[type] || '';
    // 非 Claude 的 provider 不显示缓存复选框（自动缓存，无需配置）
    if (cacheRow) cacheRow.style.display = (type === 'anthropic') ? '' : 'none';
}
// 页面加载时初始化
document.addEventListener('DOMContentLoaded', function() {
    toggleCacheTip();
});
</script>
<script src="/static/js/model.js?v=2"></script>
{% endblock %}
