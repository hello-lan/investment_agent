<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}投研 Agent{% endblock %}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #f5f6f8; -webkit-font-smoothing: antialiased; }
  .navbar { background: #1a1a2e; color: #fff; padding: 0 20px; display: flex; align-items: center; gap: 4px; height: 44px; }
  .navbar a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px; padding: 6px 14px; border-radius: 6px; transition: all 0.15s ease; font-weight: 400; }
  .navbar a:hover { color: #fff; background: rgba(255,255,255,0.1); }
  .navbar a.active { color: #fff; background: rgba(255,255,255,0.15); font-weight: 500; }
  .navbar .brand { font-weight: 600; font-size: 14px; color: #fff; margin-right: 12px; letter-spacing: 0.01em; }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav class="navbar">
  <span class="brand">📈 投研 Agent</span>
  {% for tab in tabs %}
  <a href="{{ tab.href }}"{% if tab.label == active_tab %} class="active"{% endif %}>{{ tab.label }}</a>
  {% endfor %}
</nav>
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
