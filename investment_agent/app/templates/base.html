<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}投研 Agent{% endblock %}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; }
  .navbar { background: #1a1a2e; color: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 20px; }
  .navbar a { color: #ccc; text-decoration: none; font-size: 14px; }
  .navbar a:hover, .navbar a.active { color: #fff; }
  .navbar .brand { font-weight: 600; font-size: 16px; color: #fff; margin-right: 10px; }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav class="navbar">
  <span class="brand">📈 投研 Agent</span>
  {% for tab in tabs %}
  <a href="{{ tab.href }}"{% if tab.label == active_tab %} class="active"{% endif %}>{{ tab.label }}</a>
  {% endfor %}
</nav>
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
