{% extends "base.html" %}
{% block title %}企业分析看板 — 投研 Agent{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/css/stock_dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
{% endblock %}
{% block content %}

<div class="dashboard-page">
  <div class="dash-searchbar">
    <div class="dash-search-input-wrap">
      <input type="text" id="stockSearch" class="dash-search-input"
             placeholder="输入股票代码或名称，如 600519、茅台..."
             autocomplete="off">
      <div id="searchDropdown" class="dash-search-dropdown"></div>
    </div>
    <button id="searchBtn" class="dash-search-btn">查询</button>
    <span id="syncBadge" class="dash-sync-badge" style="display:none;"></span>
  </div>

  <div id="dashEmpty" class="dash-empty">
    <div class="dash-empty-icon">📊</div>
    <p>输入股票代码，查看七步法企业分析看板</p>
    <p class="dash-empty-hint">支持上海、深圳 A 股 · 6 位代码或名称搜索</p>
  </div>

  <div id="dashMain" class="dash-main" style="display:none;">
    <div class="dash-layout">
      <nav id="sideNav" class="dash-sidenav">
        <h3>分析导航</h3>
        <a href="#snapshot" class="dash-nav-item active"><span class="step-num">◎</span>快照总览</a>
        <a href="#step1" class="dash-nav-item"><span class="step-num">①</span>营收与盈利质量</a>
        <a href="#step2" class="dash-nav-item"><span class="step-num">②</span>成本费用构成</a>
        <a href="#step3" class="dash-nav-item"><span class="step-num">③</span>成长性</a>
        <a href="#step4" class="dash-nav-item"><span class="step-num">④</span>业务构成</a>
        <a href="#step5" class="dash-nav-item"><span class="step-num">⑤</span>资产负债</a>
        <a href="#step6" class="dash-nav-item"><span class="step-num">⑥</span>投入产出</a>
        <a href="#step7" class="dash-nav-item"><span class="step-num">⑦</span>收益率</a>
        <a href="#eight" class="dash-nav-item"><span class="step-num">⑧</span>商业八问</a>
      </nav>
      <div class="dash-content" id="dashContent">
        <div class="dash-loading">加载中...</div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script src="/static/js/stock_dashboard.js"></script>
{% endblock %}
