<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投研 Agent</title>
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<nav class="navbar">
  <span class="brand">📈 投研 Agent</span>
  <a href="/" class="active">对话</a>
  <a href="/agents">Agent 配置</a>
  <a href="/skills">Skills</a>
  <a href="/settings">设置</a>
  <a href="/history">历史</a>
  <a href="/observability">观测</a>
</nav>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>会话</span>
      <button class="btn-new" onclick="newSession()">+ 新建</button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </div>
  <div class="main">
    <div class="messages" id="messages">
      <div id="welcome" style="text-align:center;color:#999;margin-top:60px;font-size:14px;">
        输入股票代码或公司名称，开始分析<br>
        <small style="color:#bbb">例如：分析一下贵州茅台（600519）的基本面</small>
      </div>
    </div>
    <div class="input-area">
      <div class="input-left">
        <div class="upload-row">
          <input type="file" id="fileInput" style="display:none" onchange="onFileSelected(event)">
          <button class="btn-upload" type="button" onclick="triggerFileSelect()">上传文件</button>
          <span class="file-chip" id="fileNameChip" style="display:none"></span>
          <button class="btn-clear-file" id="btnClearFile" type="button" style="display:none" onclick="clearFile()">移除</button>
        </div>
        <textarea id="inputBox" rows="1" placeholder="输入分析请求，Shift+Enter 换行，Enter 发送..."
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="btn-stop" id="btnStop" onclick="stopTask()">停止</button>
      <button class="btn-send" id="btnSend" onclick="sendMessage()">发送</button>
    </div>
  </div>
  <div class="right-panel">
    <h4>本次用量</h4>
    <div class="stat-row"><span>输入 Token</span><span class="stat-val" id="statInput">0</span></div>
    <div class="stat-row"><span>输出 Token</span><span class="stat-val" id="statOutput">0</span></div>
    <div class="stat-row"><span>预估费用</span><span class="stat-val" id="statCost">$0.0000</span></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="/static/js/chat.js"></script>
</body>
</html>
