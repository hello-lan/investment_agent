<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills 管理 — 投研 Agent</title>
<link rel="stylesheet" href="/static/css/settings.css">
<style>
  .skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .skill-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px;}
  .skill-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .skill-name{font-weight:600;font-size:14px;color:#1a1a2e;}
  .skill-desc{font-size:13px;color:#666;line-height:1.5;margin-bottom:10px;}
  .tool-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .tag{font-size:11px;background:#f0f1fa;color:#1a1a2e;border-radius:12px;padding:2px 8px;}
  .status{font-size:12px;color:#777;}
  .switch{padding:5px 10px;border-radius:14px;border:1px solid #ddd;cursor:pointer;background:#fff;font-size:12px;}
  .switch.on{background:#e8f5e9;color:#2e7d32;border-color:#b7e1c0;}
</style>
</head>
<body>
<nav class="navbar">
  <span class="brand">📈 投研 Agent</span>
  <a href="/">对话</a>
  <a href="/agents">Agent 配置</a>
  <a href="/skills" class="active">Skills</a>
  <a href="/settings">设置</a>
  <a href="/history">历史</a>
  <a href="/observability">观测</a>
</nav>
<div class="container">
  <div class="card">
    <div class="card-header"><h3>Skill 目录</h3></div>
    <div class="card-body">
      <div class="skill-grid" id="skillGrid"></div>
    </div>
  </div>
</div>
<script src="/static/js/skills.js"></script>
</body>
</html>
